<h2>Documentation</h2>

<p>This application allows users to create Zoom meetings from within Mattermost channels using slash commands.</p>

<p>Usage:</p>
<ul>
<li>/zoom connect — Connect your Zoom account</li>
<li>/zoom start — Start a Zoom meeting</li>
</ul>

<p>Users must authorize their Zoom account before using the integration.</p>
